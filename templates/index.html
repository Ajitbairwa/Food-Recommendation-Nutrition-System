<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Food Recommendation System</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="page-wrapper">

        <div class="form-card">

            <div class="heading-section">
                <h1>Personalized Food Recommendation System</h1>

                <p>
                    Enter your details to calculate BMI, daily calorie needs
                    and generate a personalized food plan.
                </p>
            </div>

            <form action="/generate-plan" method="POST">

                <div class="form-grid">

                    <div class="form-group">
                        <label for="age">Age</label>

                        <input
                            type="number"
                            id="age"
                            name="age"
                            min="10"
                            max="100"
                            placeholder="Enter your age"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender</label>

                        <select id="gender" name="gender" required>
                            <option value="">Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="height">Height (cm)</label>

                        <input
                            type="number"
                            id="height"
                            name="height"
                            min="100"
                            max="250"
                            step="0.1"
                            placeholder="Example: 175"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>

                        <input
                            type="number"
                            id="weight"
                            name="weight"
                            min="20"
                            max="300"
                            step="0.1"
                            placeholder="Example: 72"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="activity">Activity Level</label>

                        <select id="activity" name="activity" required>
                            <option value="">Select activity level</option>
                            <option value="sedentary">
                                Sedentary
                            </option>
                            <option value="light">
                                Lightly Active
                            </option>
                            <option value="moderate">
                                Moderately Active
                            </option>
                            <option value="active">
                                Active
                            </option>
                            <option value="very active">
                                Very Active
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="goal">Fitness Goal</label>

                        <select id="goal" name="goal" required>
                            <option value="">Select your goal</option>
                            <option value="weight loss">
                                Weight Loss
                            </option>
                            <option value="maintain">
                                Maintain Weight
                            </option>
                            <option value="weight gain">
                                Weight Gain
                            </option>
                        </select>
                    </div>

                </div>

                <button type="submit" class="submit-btn">
                    Generate Diet Plan
                </button>

            </form>

            <p class="note">
                This project provides general data-based recommendations and
                is not a substitute for professional medical advice.
            </p>

        </div>

    </div>

</body>
</html>
